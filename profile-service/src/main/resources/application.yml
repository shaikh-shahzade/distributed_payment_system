server:
  port: 8088
  
  
spring:
  application:
    name: dps-profile-service
  config:
    import: "configserver:http://localhost:8888"
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/profile_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway handles schema — never let JPA create tables
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
   
   # SQL Script Initialization
  sql:
    init:
      mode: always  # Always run scripts
      schema-locations: classpath:schema.sql  # Schema creation
      #data-locations: classpath:data.sql      # Initial data
      continue-on-error: false
      encoding: UTF-8


  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 1800000    # 30 minutes in milliseconds

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/payment-realm

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true



management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.dps.profile: DEBUG
    org.springframework.cache: DEBUG 